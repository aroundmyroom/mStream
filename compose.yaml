services:
  mstream:
    # Pull the pre-built image from GitHub Container Registry (recommended):
    #   image: ghcr.io/aroundmyroom/mstream-velvet:latest
    # Or pin to a specific release:
    #   image: ghcr.io/aroundmyroom/mstream-velvet:v5.16.33-velvet
    # Or use a locally built image:
    #   image: mstream-velvet
    image: ghcr.io/aroundmyroom/mstream-velvet:latest
    container_name: mstream-velvet
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent data - config, database, logs, sync state
      - /home/mStream/save:/app/save
      # Your music library (read-write: needed for album-art embedding and tag editing)
      - /media/music:/music
      # Cached waveform data
      - /home/mStream/waveform-cache:/app/waveform-cache
      # Cached album art / podcast / radio artwork
      - /home/mStream/image-cache:/app/image-cache
    environment:
      # ===========================================================================
      # FIRST-RUN AUTO-CONFIG  (env vars are OPTIONAL - read the note below first)
      # ===========================================================================
      #
      # NOTE: You do NOT need these environment variables to run mStream.
      # They only exist as a convenience for simple single-library setups.
      # The server works perfectly without them - just edit save/conf/default.json
      # directly (or use the admin UI after first boot) for full control.
      #
      # WHEN env vars are NOT sufficient and you should edit the config manually:
      #   - Multiple mount points / multiple music volumes
      #   - Child-vpaths (a vpath that is a sub-folder of another vpath, used for
      #     features like Albums-Only filtering or Auto-DJ source restriction)
      #   - albumsOnly / filepathPrefix / includeFilepathPrefixes rules
      #   - Any advanced folder structure that does not fit the flat layout below
      #
      # WHEN env vars ARE convenient:
      #   - Fresh Docker install with a single music volume mounted at /music
      #   - You want mStream to create the initial config on the very first start
      #     so you do not have to touch any file before the server boots
      #
      # HOW IT WORKS:
      #   Set MSTREAM_MUSIC_DIR to the path where your music volume is mounted
      #   inside the container (must match the volume mapping above).
      #   On the very first start - when save/conf/default.json has no folders -
      #   mStream writes the initial config automatically.
      #   On every subsequent restart the env vars are ignored (config already set).
      # ---------------------------------------------------------------------------
      MSTREAM_MUSIC_DIR: /music

      # Admin account (optional).
      # If BOTH variables are omitted the server starts in open mode - no login
      # screen, full library access for anyone who can reach port 3000.
      # Set both to enable authentication from the very first boot.
      # MSTREAM_ADMIN_USER: admin
      # MSTREAM_ADMIN_PASS: changeme

      # Extra feature folders — uncomment to enable.
      # Each marks MSTREAM_MUSIC_DIR as the given folder type.
      # To point at a sub-folder instead, add the matching *_SUBDIR variable
      # set to the sub-folder name (e.g. MSTREAM_YOUTUBE_SUBDIR: YouTube).
      # You can also add, change or remove folders at any time in the Admin panel.
      # For full control, skip env vars and edit save/conf/default.json directly.

      # AudioBooks & Podcasts  (type: audio-books)
      # MSTREAM_ENABLE_AUDIOBOOKS: "true"

      # Radio Recordings  (type: recordings — also enables the radio feature)
      # MSTREAM_ENABLE_RECORDINGS: "true"

      # YouTube Downloads  (type: youtube)
      # MSTREAM_ENABLE_YOUTUBE: "true"
