<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mStream Remote</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/fav/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/fav/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/fav/favicon-16x16.png">
  <link rel="shortcut icon" href="/assets/fav/favicon.ico">

  <!-- Server replaces this tag with: var remoteProperties = { code, token } -->
  <script></script>

  <script>
    (function(){var l=localStorage.getItem('ms2_theme')==='light';if(l)document.documentElement.classList.add('light');}());
  </script>
  <style>
    :root{--bg:#1a1a2e;--surface:#16213e;--raised:#0f3460;--accent:#6c8ebf;--t1:#e0e0f0;--t2:#a0a8c0;--t3:#6070a0;--border:#2a3a5e;--r:10px;--primary:#8b5cf6;--primary-h:#7c3aed;--primary-d:rgba(139,92,246,.15);--primary-g:rgba(139,92,246,.4);--red:#f87171}
    html.light{--bg:#f0f2f7;--surface:#ffffff;--raised:#e4e8f0;--accent:#3a6bc8;--t1:#111827;--t2:#4b5563;--t3:#9ca3af;--border:#d1d5db;--primary:#6d3ce6;--primary-h:#5b28d4;--primary-d:rgba(109,60,230,.12);--primary-g:rgba(109,60,230,.35);--red:#dc2626}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;display:flex;flex-direction:column}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--t1)}
    .topbar-label{font-size:11px;color:var(--t3);font-weight:400;margin-top:1px}
    .theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 10px;color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
    #login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(139,92,246,.18),transparent)}
    html.light #login-screen{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(109,60,230,.10),transparent)}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 28px 70px rgba(0,0,0,.55),0 0 100px rgba(139,92,246,.08)}
    html.light .login-card{box-shadow:0 12px 48px rgba(0,0,0,.13),0 0 60px rgba(109,60,230,.07)}
    .login-brand{text-align:center;margin-bottom:28px}
    .login-brand h2{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
    .login-brand p{color:var(--t2);font-size:13px}
    .field-label{font-size:12px;color:var(--t2);margin-bottom:5px;display:block}
    .field-input{display:block;width:100%;padding:11px 14px;background:var(--raised);color:var(--t1);border:1px solid var(--border);border-radius:var(--r);font-size:16px;margin-bottom:14px;outline:none;transition:border-color .18s,box-shadow .18s}
    .field-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-d)}
    .field-input::placeholder{color:var(--t3)}
    .btn-primary{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:background .18s,box-shadow .18s,transform .1s}
    .btn-primary:hover{background:var(--primary-h);box-shadow:0 4px 22px var(--primary-g)}
    .btn-primary:active{transform:scale(.97)}
    .btn-primary:disabled{opacity:.5;cursor:default}
    .error-msg{color:var(--red);font-size:13px;margin-top:12px;text-align:center;min-height:18px}
    #remote-screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0}
    .ctrl-row{display:flex;align-items:center;justify-content:center;gap:20px}
    .ctrl-btn{display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--t1);transition:background .15s,color .15s,box-shadow .15s,transform .1s;flex-shrink:0;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .ctrl-btn:active{transform:scale(.9)}
    .ctrl-nav{width:44px;height:44px;color:var(--t1)}
    .ctrl-nav:hover{background:rgba(255,255,255,.08)}
    html.light .ctrl-nav:hover{background:rgba(0,0,0,.06)}
    .play-main{width:56px;height:56px;background:var(--primary);color:#fff!important;box-shadow:0 0 0 0 var(--primary-g);transition:background .15s,box-shadow .2s,transform .1s}
    .play-main:hover{background:var(--primary-h);box-shadow:0 0 0 8px var(--primary-d),0 4px 18px rgba(139,92,246,.45)}
    .play-main:active{transform:scale(.9);box-shadow:0 0 0 4px var(--primary-d)}
    .ctrl-toast{font-size:11px;color:var(--t3);text-align:center;height:18px;margin-top:8px}
    .browser-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .back-btn{background:none;border:none;color:var(--accent);cursor:pointer;padding:4px 6px;display:flex;align-items:center;border-radius:5px;-webkit-tap-highlight-color:transparent}
    .back-btn:disabled{opacity:.3;cursor:default}
    .breadcrumb{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .browser-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .browser-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .browser-item:active{background:var(--raised)}
    .browser-item-icon{color:var(--t3);flex-shrink:0}
    .browser-item-name{font-size:14px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .browser-item-add{background:var(--raised);border:1px solid var(--border);color:var(--accent);font-size:11px;border-radius:5px;padding:4px 8px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
    .browser-item-add:active{background:var(--accent);color:#fff}
    .browser-empty{padding:32px 20px;text-align:center;color:var(--t3);font-size:13px}
    .browser-loading{padding:32px;display:flex;justify-content:center}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--raised);color:var(--t1);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;transition:transform .25s ease;pointer-events:none;white-space:nowrap;z-index:100}
    #toast.show{transform:translateX(-50%) translateY(0)}
    #error-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(248,113,113,.12),transparent)}
    html.light #error-screen{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(220,38,38,.08),transparent)}
    .error-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:40px 28px;width:100%;max-width:360px;box-shadow:0 28px 70px rgba(0,0,0,.55);text-align:center}
    html.light .error-card{box-shadow:0 12px 48px rgba(0,0,0,.13)}
    .error-icon{margin:0 auto 20px;width:60px;height:60px;border-radius:50%;background:rgba(248,113,113,.15);display:flex;align-items:center;justify-content:center;color:#f87171}
    html.light .error-icon{background:rgba(220,38,38,.1);color:#dc2626}
    .error-card h2{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:10px;letter-spacing:-.3px}
    .error-card p{color:var(--t2);font-size:14px;line-height:1.65;margin-bottom:28px}
    .error-back{display:inline-block;padding:10px 28px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:14px;font-weight:600;text-decoration:none;transition:background .18s,box-shadow .18s,transform .1s}
    .error-back:hover{background:var(--primary-h);box-shadow:0 4px 22px var(--primary-g)}
    .error-back:active{transform:scale(.97)}
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">
      <svg width="22" height="22" viewBox="72 33 76 89">
        <polygon fill="#6684B2" points="75,118.5 75,35.5 96,48.5 96,118.5"/>
        <polygon fill="#26477B" points="99,118.5 99,49.5 110.5,56.5 121,49.5 121,118.5"/>
        <polygon fill="#6684B2" points="124,118.5 124,48.5 145,35.5 145,118.5"/>
      </svg>
      <div>
        <div>mStream</div>
        <div class="topbar-label">Remote Control</div>
      </div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">
      <svg id="theme-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="theme-label">Dark</span>
    </button>
  </div>

  <div id="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <svg width="36" height="36" viewBox="72 33 76 89" style="display:block;margin:0 auto 12px">
          <polygon fill="#6684B2" points="75,118.5 75,35.5 96,48.5 96,118.5"/>
          <polygon fill="#26477B" points="99,118.5 99,49.5 110.5,56.5 121,49.5 121,118.5"/>
          <polygon fill="#6684B2" points="124,118.5 124,48.5 145,35.5 145,118.5"/>
        </svg>
        <h2>Remote Control</h2>
        <p>Enter the code shown on the Jukebox screen.</p>
      </div>
      <label class="field-label" for="code-input">Jukebox Code</label>
      <input class="field-input" id="code-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="e.g. aB3xY7qW">
      <button class="btn-primary" id="connect-btn" onclick="connectWithCode()">Connect</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <div id="error-screen" style="display:none">
    <div class="error-card">
      <div class="error-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h2>Code Not Found</h2>
      <p>This remote code is invalid or has expired.<br>Open the Jukebox screen in mStream to get a fresh code.</p>
      <a class="error-back" href="/remote/">Try Another Code</a>
    </div>
  </div>

  <div id="remote-screen" style="display:none">
    <div class="controls">
      <div class="ctrl-row">
        <button class="ctrl-btn ctrl-nav" title="Previous" onclick="sendCommand('previous')">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-main" id="play-btn" title="Play / Pause" onclick="sendCommand('playPause')">
          <svg id="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="4" width="4" height="16" rx="1.5"/><rect x="15" y="4" width="4" height="16" rx="1.5"/></svg>
        </button>
        <button class="ctrl-btn ctrl-nav" title="Next" onclick="sendCommand('next')">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="ctrl-toast" id="ctrl-toast"></div>
    </div>
    <div class="browser-header">
      <button class="back-btn" id="back-btn" onclick="goBack()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="breadcrumb" id="breadcrumb">/</span>
    </div>
    <div class="browser-list" id="browser-list">
      <div class="browser-loading"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    var _token = '', _code = '', _pathStack = [], _toastTimer = null, _isPlaying = false;

    function updatePlayBtn() {
      document.getElementById('play-icon').style.display  = _isPlaying ? 'none'  : '';
      document.getElementById('pause-icon').style.display = _isPlaying ? '' : 'none';
    }

    function applyTheme(light) {
      document.documentElement.classList.toggle('light', light);
      document.getElementById('theme-label').textContent = light ? 'Light' : 'Dark';
      var icon = document.getElementById('theme-icon');
      icon.innerHTML = light
        ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      localStorage.setItem('ms2_theme', light ? 'light' : 'dark');
    }
    function toggleTheme() { applyTheme(!document.documentElement.classList.contains('light')); }
    applyTheme(localStorage.getItem('ms2_theme') === 'light');

    function toast(msg, ms) {
      var el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, ms || 2000);
    }
    function ctrlToast(msg) {
      var el = document.getElementById('ctrl-toast');
      el.textContent = msg;
      setTimeout(function(){ if (el.textContent === msg) el.textContent = ''; }, 1500);
    }

    function sendCommand(command, file) {
      var body = { code: _code, command: command };
      if (file) body.file = file;
      fetch('/api/v1/jukebox/push-to-client', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-access-token': _token },
        body: JSON.stringify(body)
      }).then(function(r) {
        var labels = { previous: '\u23EE Prev', next: '\u23ED Next', playPause: '\u23EF Play/Pause', addSong: '\u2713 Added to queue' };
        if (!r.ok) { if (r.status === 404) toast('Player disconnected'); }
        else {
          if (command === 'playPause') { _isPlaying = !_isPlaying; updatePlayBtn(); }
          ctrlToast(labels[command] || '\u2713');
        }
      }).catch(function(){ toast('Connection error'); });
    }

    function loadDirectory() {
      var list = document.getElementById('browser-list');
      list.innerHTML = '<div class="browser-loading"><div class="spinner"></div></div>';
      var dirStr = _pathStack.length ? _pathStack.join('/') + '/' : '';
      document.getElementById('breadcrumb').textContent = '/' + _pathStack.join('/');
      document.getElementById('back-btn').disabled = _pathStack.length === 0;
      fetch('/api/v1/file-explorer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-access-token': _token },
        body: JSON.stringify({ directory: dirStr })
      }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) {
        var items = [];
        (data.directories || []).forEach(function(d){ items.push({ type:'dir',  name:d.name, path:null }); });
        (data.files      || []).forEach(function(f){ items.push({ type:'file', name:f.name, path:data.path + f.name }); });
        if (!items.length) { list.innerHTML = '<div class="browser-empty">No files here</div>'; return; }
        list.innerHTML = '';
        items.forEach(function(item) {
          var row  = document.createElement('div'); row.className = 'browser-item';
          var icon = document.createElement('span'); icon.className = 'browser-item-icon';
          icon.innerHTML = item.type === 'dir'
            ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
            : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
          var name = document.createElement('span'); name.className = 'browser-item-name'; name.textContent = item.name;
          row.appendChild(icon); row.appendChild(name);
          if (item.type === 'file') {
            var addBtn = document.createElement('button'); addBtn.className = 'browser-item-add'; addBtn.textContent = '+ Queue';
            (function(p){
              addBtn.onclick = function(e){ e.stopPropagation(); sendCommand('addSong', p); };
              row.onclick    = function(){ sendCommand('addSong', p); };
            }(item.path));
            row.appendChild(addBtn);
          } else {
            (function(n){ row.onclick = function(){ _pathStack.push(n); loadDirectory(); }; }(item.name));
          }
          list.appendChild(row);
        });
      }).catch(function(){ list.innerHTML = '<div class="browser-empty">Failed to load directory</div>'; });
    }

    function goBack() { if (_pathStack.length) { _pathStack.pop(); loadDirectory(); } }

    function showRemote() {
      _isPlaying = false; updatePlayBtn();
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('remote-screen').style.display = 'flex';
      loadDirectory();
    }

    function connectWithCode() {
      var btn = document.getElementById('connect-btn');
      var err = document.getElementById('login-error');
      var code = document.getElementById('code-input').value.trim();
      if (!code) return;
      btn.disabled = true; btn.textContent = 'Connecting\u2026'; err.textContent = '';
      fetch('/api/v1/jukebox/does-code-exist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      }).then(function(r){ return r.json(); })
      .then(function(data) {
        if (data.status !== true) throw new Error('not found');
        _code = code; _token = data.token || '';
        showRemote();
      }).catch(function(){
        err.textContent = 'Code not found. Check the Jukebox screen.';
        btn.disabled = false; btn.textContent = 'Connect';
      });
    }

    document.getElementById('code-input').addEventListener('keydown', function(e){
      if (e.key === 'Enter') connectWithCode();
    });

    // Auto-connect or show error when server pre-injects state via the /remote/:code route
    if (typeof remoteProperties !== 'undefined') {
      if (remoteProperties.error) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('error-screen').style.display = 'flex';
      } else if (remoteProperties.code && remoteProperties.code !== 0) {
        _code  = remoteProperties.code;
        _token = remoteProperties.token || '';
        showRemote();
      }
    }
  </script>
</body>
</html>
