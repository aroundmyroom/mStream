  <script>
    (function() {
      // Main app stores theme under ms2_theme_<username> — scan localStorage for it.
      var t = null;
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.indexOf('ms2_theme_') === 0) { t = localStorage.getItem(key); break; }
      }
      // Fall back to OS preference (same logic as main app)
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'velvet' : 'light';
      if (t === 'dark')  document.documentElement.classList.add('dark');
      if (t === 'light') document.documentElement.classList.add('light');
    })();
    (function() {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="72 33 76 89"><defs><linearGradient id="afv-o" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#6d28d9" stop-opacity=".85"/></linearGradient><linearGradient id="afv-i" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs><polygon fill="url(#afv-o)" points="75,118.5 75,35.5 96,48.5 96,118.5"/><polygon fill="url(#afv-i)" points="99,118.5 99,49.5 110.5,56.5 121,49.5 121,118.5"/><polygon fill="url(#afv-o)" points="124,118.5 124,48.5 145,35.5 145,118.5"/></svg>';
      var href = 'data:image/svg+xml,' + encodeURIComponent(svg);
      document.querySelectorAll('link[rel*="icon"]').forEach(function(el) { el.href = href; });
    })();
  </script>

  <script>
    function applyTheme(theme) {
      document.documentElement.classList.remove('dark', 'light');
      if (theme === 'dark')  document.documentElement.classList.add('dark');
      if (theme === 'light') document.documentElement.classList.add('light');
      localStorage.setItem('ms2_theme', theme);
      document.querySelectorAll('.theme-seg-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }
    document.querySelectorAll('.theme-seg-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { applyTheme(btn.dataset.theme); });
    });
    applyTheme(localStorage.getItem('ms2_theme') || 'velvet');

    document.getElementById('sidenav-cover').addEventListener('click', function() {
      closeSideMenu();
    });
    function toggleSideMenu() {
      document.getElementById('sidenav').classList.toggle('open');
      document.getElementById('sidenav-cover').classList.toggle('open');
    }
    function closeSideMenu() {
      var nav = document.getElementById('sidenav');
      if (nav.classList.contains('open')) toggleSideMenu();
    }
    function gotoPlayer() {
      var playerOrigin = window.location.origin + '/';
      // window.open('', name) reuses an existing named tab without navigating it.
      // If no tab with that name exists the browser opens a new blank one.
      // If popups are blocked it may return null or the current window.
      var w = window.open('', 'mStream-Velvet');
      if (!w || w === window) {
        // Popup blocked or browser returned current window — open a new named tab directly.
        window.open(playerOrigin, 'mStream-Velvet');
        return;
      }
      // Got a reference to a tab — check whether it already has the player loaded.
      try {
        var href = w.location.href;
        if (!href || href === 'about:blank') {
          // Newly created blank tab (player tab was closed) — navigate it to the player.
          w.location.href = playerOrigin;
        }
        // Tab already has the player loaded — just bring it to the front.
      } catch(e) {
        // Cross-origin error (shouldn't happen same-origin) — navigate anyway.
        w.location.href = playerOrigin;
      }
      w.focus();
    }
  </script>
