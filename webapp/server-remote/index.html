<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mStream Velvet — Server Audio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function(){
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="72 33 76 89"><defs><linearGradient id="sa-o" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#6d28d9" stop-opacity=".85"/></linearGradient><linearGradient id="sa-i" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs><polygon fill="url(#sa-o)" points="75,118.5 75,35.5 96,48.5 96,118.5"/><polygon fill="url(#sa-i)" points="99,118.5 99,49.5 110.5,56.5 121,49.5 121,118.5"/><polygon fill="url(#sa-o)" points="124,118.5 124,48.5 145,35.5 145,118.5"/></svg>';
      var href = 'data:image/svg+xml,' + encodeURIComponent(svg);
      var l = document.createElement('link'); l.rel = 'icon'; l.type = 'image/svg+xml'; l.href = href;
      document.head.appendChild(l);
    }());
    (function() {
      var t = localStorage.getItem('ms2_theme');
      if (t === 'light') document.documentElement.classList.add('light');
      else if (t === 'dark') document.documentElement.classList.add('dark');
    }());
  </script>
  <style>
    :root{--bg:#1a1a2e;--surface:#16213e;--raised:#0f3460;--card:#1e2d4a;--border:#2a3a5e;--r:7px;--primary:#8b5cf6;--primary-h:#7c3aed;--primary-d:rgba(139,92,246,.15);--primary-g:rgba(139,92,246,.4);--accent:#60a5fa;--red:#f87171;--green:#4ade80;--t1:#eeeeff;--t2:#8888b0;--t3:#7e8ec0}
    :root.dark{--bg:#000;--surface:#0d0d0d;--raised:#1c1c1e;--card:#141414;--border:rgba(255,255,255,.09);--primary:#a78bfa;--primary-h:#9061f9;--primary-d:rgba(167,139,250,.14);--primary-g:rgba(167,139,250,.38);--accent:#60a5fa;--red:#f87171;--green:#4ade80;--t1:#f1f1f1;--t2:#8a8a9a;--t3:#707082}
    :root.light{--bg:#e8e8f2;--surface:#f2f2fa;--raised:#e4e4ef;--card:#dcdcec;--border:rgba(0,0,0,.10);--primary:#6d3ce6;--primary-h:#5b28d4;--primary-d:rgba(109,60,230,.12);--primary-g:rgba(109,60,230,.35);--accent:#2563eb;--red:#dc2626;--green:#16a34a;--t1:#0c0c1a;--t2:#42425e;--t3:#7878a0}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    /* ── topbar ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
    .topbar-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
    .topbar-badge{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:var(--primary-d);color:var(--primary);border:1px solid var(--primary-d);border-radius:4px;padding:2px 6px;margin-left:2px}
    .topbar-status{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .dot-on{background:var(--green)}
    .dot-off{background:var(--t3)}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 11px;color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;min-height:34px}
    /* ── screens ── */
    #login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(139,92,246,.18),transparent)}
    :root.light #login-screen{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(109,60,230,.10),transparent)}
    :root.dark  #login-screen{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(167,139,250,.12),transparent)}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 28px 70px rgba(0,0,0,.55),0 0 100px rgba(139,92,246,.08)}
    :root.light .login-card{box-shadow:0 12px 48px rgba(0,0,0,.13)}
    :root.dark  .login-card{box-shadow:0 28px 70px rgba(0,0,0,.85)}
    .login-brand{text-align:center;margin-bottom:28px}
    .login-brand h2{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
    .login-brand p{color:var(--t2);font-size:13px}
    .field-label{font-size:12px;color:var(--t2);margin-bottom:5px;display:block}
    .field-input{display:block;width:100%;padding:11px 14px;background:var(--raised);color:var(--t1);border:1px solid var(--border);border-radius:var(--r);font-size:16px;margin-bottom:14px;outline:none;transition:border-color .18s,box-shadow .18s}
    .field-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-d)}
    .field-input::placeholder{color:var(--t3)}
    .btn-primary{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:background .18s,box-shadow .18s,transform .1s}
    .btn-primary:hover{background:var(--primary-h);box-shadow:0 4px 22px var(--primary-g)}
    .btn-primary:active{transform:scale(.97)}
    .btn-primary:disabled{opacity:.5;cursor:default}
    .error-msg{color:var(--red);font-size:13px;margin-top:12px;text-align:center;min-height:18px}
    /* ── main screen ── */
    #main-screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
    /* ── now playing ── */
    .np-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0}
    .np-art{width:72px;height:72px;border-radius:8px;object-fit:cover;background:var(--raised);flex-shrink:0}
    .np-info{flex:1;min-width:0}
    .np-title{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);margin-bottom:2px}
    .np-artist{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
    .np-tech{font-size:10.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;letter-spacing:.01em}
    .np-prog-track{height:3px;background:var(--raised);border-radius:2px;cursor:pointer;position:relative}
    .np-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .9s linear;pointer-events:none}
    .np-time{font-size:11px;color:var(--t3);margin-top:3px;display:flex;justify-content:space-between}
    /* ── controls ── */
    .controls{padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}
    .ctrl-row{display:flex;align-items:center;justify-content:center;gap:18px;width:100%}
    .ctrl-btn{display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--t1);background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s,transform .1s;flex-shrink:0}
    .ctrl-btn:active{transform:scale(.88)}
    .ctrl-nav{width:42px;height:42px}
    .ctrl-nav:hover{background:rgba(255,255,255,.08)}
    :root.light .ctrl-nav:hover{background:rgba(0,0,0,.06)}
    .play-btn{width:54px;height:54px;background:var(--primary)!important;color:#fff!important;box-shadow:0 0 0 0 var(--primary-g);transition:background .15s,box-shadow .2s,transform .1s}
    .play-btn:hover{background:var(--primary-h)!important;box-shadow:0 0 0 8px var(--primary-d),0 4px 18px rgba(139,92,246,.45)}
    .play-btn:active{transform:scale(.9)}
    .transport-row{display:flex;align-items:center;gap:10px}
    .transport-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t2);font-size:13px;padding:8px 13px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s,color .15s,border-color .15s;-webkit-tap-highlight-color:transparent;min-height:38px}
    .transport-btn:active{background:var(--raised)}
    .transport-btn.active{background:var(--primary-d);color:var(--primary);border-color:var(--primary)}
    .vol-row{display:flex;align-items:center;gap:10px;width:100%;max-width:320px}
    .vol-label{font-size:11px;color:var(--t3);flex-shrink:0;width:28px;text-align:right}
    input[type=range].vol-slider{flex:1;height:4px;accent-color:var(--primary);cursor:pointer}
    /* ── tabs ── */
    .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
    .tab{flex:1;padding:12px 0;font-size:12px;font-weight:600;letter-spacing:.04em;text-align:center;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent;user-select:none}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    /* ── tab panels ── */
    .tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .tab-panel.active{display:flex;flex-direction:column}
    /* ── Queue tab ── */
    .queue-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .queue-item:active{background:var(--raised)}
    .queue-item.playing{background:var(--primary-d)}
    .queue-item-num{font-size:12px;color:var(--t3);width:22px;text-align:right;flex-shrink:0}
    .queue-item-info{flex:1;min-width:0}
    .queue-item-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
    .queue-item.playing .queue-item-title{color:var(--accent)}
    .queue-item-sub{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .queue-item-del{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px 6px;font-size:18px;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent}
    .queue-item-del:active{color:var(--red)}
    .queue-empty{padding:36px 20px;text-align:center;color:var(--t3);font-size:13px}
    /* ── DJ tab ── */
    .dj-panel{padding:16px}
    .dj-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
    .dj-toggle-label{font-size:14px;font-weight:600;color:var(--t1)}
    .dj-toggle-sub{font-size:12px;color:var(--t2);margin-top:2px}
    .toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
    .toggle-switch input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--raised);border-radius:12px;cursor:pointer;transition:background .2s}
    .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
    .toggle-switch input:checked + .toggle-slider{background:var(--primary)}
    .toggle-switch input:checked + .toggle-slider::before{transform:translateX(20px)}
    .dj-option{padding:12px 0;border-bottom:1px solid var(--border)}
    .dj-option-label{font-size:12px;color:var(--t2);margin-bottom:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .mode-btns{display:flex;gap:8px}
    .mode-btn{flex:1;padding:8px 0;background:var(--raised);border:1px solid var(--border);color:var(--t2);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
    .mode-btn.active{background:var(--primary-d);color:var(--primary);border-color:var(--primary)}
    .dj-status-bar{margin-top:12px;padding:10px 14px;background:var(--raised);border-radius:var(--r);font-size:12px;color:var(--t2)}
    .dj-status-bar.on{color:var(--green)}
    /* ── Browse tab ── */
    .browser-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
    .back-btn{background:none;border:none;color:var(--accent);cursor:pointer;padding:4px 6px;display:flex;align-items:center;border-radius:5px;-webkit-tap-highlight-color:transparent}
    .back-btn:disabled{opacity:.3;cursor:default}
    .breadcrumb{font-size:13px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .browser-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .browser-item:active{background:var(--raised)}
    .browser-item-icon{color:var(--t3);flex-shrink:0}
    .browser-item-name{font-size:14px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .browser-item-add{background:var(--raised);border:1px solid var(--border);color:var(--accent);font-size:12px;border-radius:5px;padding:7px 11px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;min-height:36px}
    .browser-item-add:active{background:var(--accent);color:#fff}
    .browser-empty{padding:32px 20px;text-align:center;color:var(--t3);font-size:13px}
    .spinner-wrap{padding:32px;display:flex;justify-content:center}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* ── toast ── */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--raised);color:var(--t1);border:1px solid var(--border);border-radius:20px;padding:9px 20px;font-size:13px;transition:transform .25s ease;pointer-events:none;white-space:normal;max-width:calc(100vw - 40px);text-align:center;z-index:200}
    #toast.show{transform:translateX(-50%) translateY(0)}
    /* ── Search panel ── */
    .search-input-wrap{display:flex;align-items:center;gap:8px;background:var(--raised);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;transition:border-color .18s}
    .search-input-wrap:focus-within{border-color:var(--primary)}
    .search-input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:15px;-webkit-appearance:none}
    .search-input::placeholder{color:var(--t3)}
    .search-clear{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px;line-height:1;font-size:16px;flex-shrink:0;display:none}
    .search-input:not(:placeholder-shown) ~ .search-clear{display:block}
    .search-results-list{overflow-y:auto;max-height:200px;margin-top:6px}
    .search-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .search-item:last-child{border-bottom:none}
    .search-item-info{flex:1;min-width:0}
    .search-item-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
    .search-item-artist{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .search-item-add{background:var(--raised);border:1px solid var(--border);color:var(--accent);font-size:18px;border-radius:5px;padding:4px 10px;cursor:pointer;flex-shrink:0;min-height:36px;line-height:1;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s}
    .search-item-add:active{background:var(--accent);color:#fff}
    .search-msg{font-size:12px;color:var(--t3);padding:10px 0;text-align:center}
    /* ── small-phone adjustments (iPhone SE, narrow screens) ── */
    @media (max-width: 390px) {
      .login-card{padding:24px 18px}
      .np-bar{padding:10px 12px;gap:10px}
      .np-art{width:60px;height:60px}
      .controls{padding:10px 12px;gap:10px}
      .ctrl-nav{width:38px;height:38px}
      .play-btn{width:50px;height:50px}
      .transport-btn{font-size:12px;padding:7px 11px}
      .browser-item{padding:11px 12px}
      .queue-item{padding:9px 12px}
      .topbar{padding:8px 12px}
    }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <div class="topbar">
    <div class="topbar-brand">
      <svg width="20" height="20" viewBox="72 33 76 89">
        <defs>
          <linearGradient id="srv-o" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#6d28d9" stop-opacity=".85"/></linearGradient>
          <linearGradient id="srv-i" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
        </defs>
        <polygon fill="url(#srv-o)" points="75,118.5 75,35.5 96,48.5 96,118.5"/>
        <polygon fill="url(#srv-i)" points="99,118.5 99,49.5 110.5,56.5 121,49.5 121,118.5"/>
        <polygon fill="url(#srv-o)" points="124,118.5 124,48.5 145,35.5 145,118.5"/>
      </svg>
      mStream Velvet <span class="topbar-badge">Server Audio</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-status" id="mpv-status">
        <div class="dot dot-off" id="status-dot"></div>
        <span id="status-text">—</span>
      </div>
      <button class="theme-btn" onclick="cycleTheme()">
        <svg id="theme-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="theme-label">Velvet</span>
      </button>
    </div>
  </div>

  <!-- ── Login screen ── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <svg width="36" height="36" viewBox="72 33 76 89" style="display:block;margin:0 auto 12px">
          <defs>
            <linearGradient id="lsrv-o" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#6d28d9" stop-opacity=".85"/></linearGradient>
            <linearGradient id="lsrv-i" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
          </defs>
          <polygon fill="url(#lsrv-o)" points="75,118.5 75,35.5 96,48.5 96,118.5"/>
          <polygon fill="url(#lsrv-i)" points="99,118.5 99,49.5 110.5,56.5 121,49.5 121,118.5"/>
          <polygon fill="url(#lsrv-o)" points="124,118.5 124,48.5 145,35.5 145,118.5"/>
        </svg>
        <h2>Server Audio</h2>
        <p>Sign in to control server-side playback</p>
      </div>
      <label class="field-label" for="u-input">Username</label>
      <input class="field-input" id="u-input" type="text" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="username">
      <label class="field-label" for="p-input">Password</label>
      <input class="field-input" id="p-input" type="password" autocomplete="current-password" placeholder="password">
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
      <div class="error-msg" id="login-err"></div>
    </div>
  </div>

  <!-- ── Main screen ── -->
  <div id="main-screen" style="display:none">

    <!-- Now Playing -->
    <div class="np-bar" id="np-bar">
      <img class="np-art" id="np-art" src="" alt="" onerror="this.src=''">
      <div class="np-info">
        <div class="np-title" id="np-title">Nothing playing</div>
        <div class="np-artist" id="np-artist"></div>
        <div class="np-tech" id="np-tech"></div>
        <div class="np-prog-track" id="prog-track" onclick="seekClick(event)">
          <div class="np-prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="np-time"><span id="np-cur">0:00</span><span id="np-dur">0:00</span></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-row">
        <button class="ctrl-btn ctrl-nav" title="Previous" onclick="api('POST','api/v1/server-playback/previous')">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="play-btn" title="Play / Pause" onclick="api('POST','api/v1/server-playback/pause')">
          <svg id="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="4" width="4" height="16" rx="1.5"/><rect x="15" y="4" width="4" height="16" rx="1.5"/></svg>
        </button>
        <button class="ctrl-btn ctrl-nav" title="Next" onclick="api('POST','api/v1/server-playback/next')">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="transport-row">
        <button class="transport-btn" id="loop-btn" onclick="doLoop()" title="Loop mode">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <span id="loop-label">Off</span>
        </button>
        <button class="transport-btn" id="dj-transport-btn" onclick="setTab('dj')" title="Auto-DJ">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m10 8 6 4-6 4V8z"/></svg>
          <span id="dj-transport-label">DJ</span>
        </button>
        <button class="transport-btn" onclick="clearAndRefill()" title="Clear queue">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          Clear
        </button>
      </div>
      <div class="vol-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--t3);flex-shrink:0"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="130" value="100" oninput="setVol(this.value)">
        <span class="vol-label" id="vol-val">100</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-queue" onclick="setTab('queue')">Queue</div>
      <div class="tab" id="tab-search"  onclick="setTab('search')">Search</div>
      <div class="tab" id="tab-dj"      onclick="setTab('dj')">Auto-DJ</div>
      <div class="tab" id="tab-browse"  onclick="setTab('browse')">Browse</div>
    </div>

    <!-- Queue panel -->
    <div class="tab-panel active" id="panel-queue">
      <div id="queue-list"></div>
    </div>

    <!-- Search panel -->
    <div class="tab-panel" id="panel-search">
      <div class="dj-panel">
        <div class="search-input-wrap" style="margin-bottom:8px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--t3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="search-input" type="search" placeholder="Search songs…" oninput="onSearchInput()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button class="search-clear" id="search-clear" onclick="clearSearch()" tabindex="-1">✕</button>
        </div>
        <div id="search-results-list" class="search-results-list" style="max-height:none"></div>
      </div>
    </div>

    <!-- Auto-DJ panel -->
    <div class="tab-panel" id="panel-dj">
      <div class="dj-panel">
        <div class="dj-toggle-row">
          <div>
            <div class="dj-toggle-label">Auto-DJ</div>
            <div class="dj-toggle-sub">Automatically queue the next song</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="dj-toggle" onchange="onDjToggle(this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="dj-option">
          <div class="dj-option-label">Mode</div>
          <div class="mode-btns">
            <button class="mode-btn active" id="mode-random" onclick="setDjMode('random')">Random</button>
            <button class="mode-btn" id="mode-similar" onclick="setDjMode('similar')">Similar Artists <small style="opacity:.7">(Last.fm)</small></button>
          </div>
        </div>
        <div class="dj-status-bar" id="dj-status-bar">Auto-DJ is off</div>
      </div>
    </div>

    <!-- Browse panel -->
    <div class="tab-panel" id="panel-browse">
      <div class="browser-header">
        <button class="back-btn" id="bk-btn" onclick="browseBack()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="breadcrumb" id="breadcrumb">/</span>
      </div>
      <div id="browse-list"></div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
  'use strict';
  // ── State ──────────────────────────────────────────────────────────────────
  var _token      = '';
  var _vpaths     = [];
  var _noAuth     = false;   // true = server has no users configured
  var _pollTimer  = null;
  var _volTimer   = null;
  var _toastTimer = null;
  var _lastStatus = null;
  var _pathStack  = [];
  var _tab        = 'queue';

  var _djOn       = false;
  var _djMode     = 'random';  // 'random' | 'similar'
  var _djIgnore   = [];        // random ignore list
  var _djFetching = false;

  var _searchTimer   = null;
  var _searchResults = [];
  var _metaCache     = {};   // filepath -> { bitrate, sampleRate, channels } from DB

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmt(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60); }

  function toast(msg, ms){
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, ms||2000);
  }

  function api(method, path, data){
    var opts = { method: method, headers: { 'Content-Type':'application/json', 'x-access-token': _token } };
    if (data) opts.body = JSON.stringify(data);
    return fetch('/' + path, opts).then(function(r){
      if (!r.ok) return r.json().then(function(j){ throw new Error(j.error||r.status); });
      return r.json();
    });
  }

  // ── Theme ──────────────────────────────────────────────────────────────────
  function applyTheme(t){
    document.documentElement.classList.remove('dark','light');
    if (t==='dark')  document.documentElement.classList.add('dark');
    if (t==='light') document.documentElement.classList.add('light');
    var labels = { velvet:'Velvet', dark:'Dark', light:'Light' };
    document.getElementById('theme-label').textContent = labels[t]||'Velvet';
    localStorage.setItem('ms2_theme', t);
  }
  function cycleTheme(){
    var t = localStorage.getItem('ms2_theme')||'velvet';
    applyTheme(t==='velvet'?'dark':t==='dark'?'light':'velvet');
  }
  applyTheme(localStorage.getItem('ms2_theme')||'velvet');

  // ── Auth ───────────────────────────────────────────────────────────────────
  function doLogin(){
    var btn = document.getElementById('login-btn');
    var err = document.getElementById('login-err');
    var u   = document.getElementById('u-input').value.trim();
    var p   = document.getElementById('p-input').value;
    btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
    fetch('/api/v1/auth/login', {
      method: 'POST', headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ username: u, password: p })
    }).then(function(r){ return r.json().then(function(j){ if (!r.ok) throw new Error(j.error||'Login failed'); return j; }); })
    .then(function(data){
      _token  = data.token || '';
      _vpaths = data.vpaths || [];
      startApp();
    }).catch(function(e){
      err.textContent = e.message || 'Login failed';
      btn.disabled = false; btn.textContent = 'Sign in';
    });
  }

  function tryNoAuthLogin(){
    // If the server has no users, auth middleware auto-grants access
    // Probe with a protected endpoint using no token
    fetch('/api/v1/server-playback/status', { headers: { 'x-access-token': '' } })
      .then(function(r){
        if (r.ok) {
          _noAuth = true; _token = '';
          return r.json().then(function(s){
            // Get vpaths from playlist API
            return fetch('/api/v1/ping', { headers: { 'x-access-token':'' } })
              .then(function(r2){ return r2.ok ? r2.json() : {}; })
              .then(function(d){ _vpaths = d.vpaths || []; startApp(); })
              .catch(function(){ _vpaths = []; startApp(); });
          });
        }
        // 401 = need login
        showLogin();
      }).catch(function(){ showLogin(); });
  }

  function showLogin(){
    document.getElementById('login-screen').style.display = 'flex';
  }

  ['u-input','p-input'].forEach(function(id){
    document.getElementById(id).addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  });

  // ── App start ──────────────────────────────────────────────────────────────
  function startApp(){
    // Check if this user has permission to use server-remote
    fetch('/api/v1/ping', { headers: { 'Content-Type':'application/json', 'x-access-token': _token } })
      .then(function(r){ return r.ok ? r.json() : {}; })
      .then(function(d){
        if (d.allowServerRemote === false) {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('main-screen').style.display  = 'none';
          document.body.innerHTML = '<div style="font-family:system-ui,sans-serif;background:#1a1a2e;color:#e4e4e4;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0">'
            + '<div style="max-width:420px;padding:40px;text-align:center">'
            + '<h1 style="color:#a78bfa;margin-bottom:12px">Access Denied</h1>'
            + '<p style="color:#8888b0;line-height:1.6;margin-bottom:24px">Your account does not have permission to use the Server Remote, or MPV (Casting) is not enabled.<br>Contact your administrator.</p>'
            + '<a href="/" style="color:#a78bfa;text-decoration:none">← Back to Player</a></div></div>';
          return;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').style.display  = 'flex';
        renderQueue([]);
        loadBrowse();
        startPolling();
      }).catch(function(){
        // Fallback: if ping fails just proceed (no-auth mode or network error)
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').style.display  = 'flex';
        renderQueue([]);
        loadBrowse();
        startPolling();
      });
  }

  // ── Polling ────────────────────────────────────────────────────────────────
  function startPolling(){
    poll();
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(poll, 2000);
  }

  function poll(){
    api('GET','api/v1/server-playback/status').then(function(s){
      _lastStatus = s;
      updateUI(s);
      maybeAutoDJ(s);
    }).catch(function(){});
  }

  function updateUI(s){
    // Status dot
    var dot  = document.getElementById('status-dot');
    var stxt = document.getElementById('status-text');
    if (s.running){
      dot.className  = 'dot ' + (s.playing ? 'dot-on' : 'dot-off');
      stxt.textContent = s.playing ? 'Playing' : 'Paused';
    } else {
      dot.className  = 'dot dot-off';
      stxt.textContent = 'Stopped';
    }

    // Play / pause icon
    document.getElementById('play-icon').style.display  = s.playing ? 'none' : '';
    document.getElementById('pause-icon').style.display = s.playing ? '' : 'none';

    // Loop button
    var lb = document.getElementById('loop-btn');
    var ll = document.getElementById('loop-label');
    if (s.loopMode==='one')  { lb.classList.add('active');    ll.textContent = 'One'; }
    else if (s.loopMode==='all') { lb.classList.add('active'); ll.textContent = 'All'; }
    else                     { lb.classList.remove('active'); ll.textContent = 'Off'; }

    // Now playing info
    var cur = (s.queue && s.currentIndex >= 0) ? s.queue[s.currentIndex] : null;
    document.getElementById('np-title').textContent  = cur ? (cur.title  || cur.relPath.split('/').pop()) : 'Nothing playing';
    document.getElementById('np-artist').textContent = cur ? (cur.artist || '') : '';

    // Tech info (bitrate / samplerate / channels) — fetched once per unique path
    if (cur && cur.relPath) {
      var techEl = document.getElementById('np-tech');
      if (_metaCache[cur.relPath]) {
        techEl.textContent = _metaCache[cur.relPath];
      } else {
        techEl.textContent = '';
        api('POST','api/v1/db/metadata',{ filepath: cur.relPath })
          .then(function(meta){
            var m = meta.metadata || {};
            var parts = [];
            var fmt = (meta.filepath || cur.relPath).split('.').pop().toUpperCase();
            if (fmt) parts.push(fmt);
            if (m.bitrate)        parts.push(m.bitrate + ' kbps');
            if (m['sample-rate']) parts.push((m['sample-rate'] / 1000).toFixed(1).replace('.0','') + ' kHz');
            if (m.channels)       parts.push(m.channels === 2 ? 'Stereo' : m.channels === 1 ? 'Mono' : m.channels + 'ch');
            var str = parts.join(' · ');
            _metaCache[cur.relPath] = str;
            // Only update if this song is still current
            var nowCur = (_lastStatus && _lastStatus.queue && _lastStatus.currentIndex >= 0)
              ? _lastStatus.queue[_lastStatus.currentIndex] : null;
            if (nowCur && nowCur.relPath === cur.relPath) techEl.textContent = str;
          }).catch(function(){});
      }
    } else {
      document.getElementById('np-tech').textContent = '';
    }

    var art = document.getElementById('np-art');
    if (cur && cur.albumArt) { art.src = '/album-art/' + cur.albumArt; art.style.opacity = '1'; }
    else { art.src = ''; art.style.opacity = '0'; }

    // Progress
    var pct = (s.duration > 0) ? (s.currentTime / s.duration * 100).toFixed(2) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('np-cur').textContent = fmt(s.currentTime);
    document.getElementById('np-dur').textContent = fmt(s.duration);

    // Queue (only re-render if needed)
    renderQueue(s.queue || [], s.currentIndex);
  }

  // ── Seek click ─────────────────────────────────────────────────────────────
  function seekClick(e){
    if (!_lastStatus || !_lastStatus.duration) return;
    var track = document.getElementById('prog-track');
    var rect  = track.getBoundingClientRect();
    var pct   = (e.clientX - rect.left) / rect.width;
    var pos   = Math.max(0, Math.min(_lastStatus.duration, pct * _lastStatus.duration));
    api('POST','api/v1/server-playback/seek',{ position: pos });
  }

  // ── Volume ─────────────────────────────────────────────────────────────────
  function setVol(v){
    document.getElementById('vol-val').textContent = v;
    clearTimeout(_volTimer);
    _volTimer = setTimeout(function(){ api('POST','api/v1/server-playback/volume',{ volume: Number(v) }); }, 200);
  }

  // ── Loop ───────────────────────────────────────────────────────────────────
  function doLoop(){
    api('POST','api/v1/server-playback/loop').then(function(d){
      toast(d.loop_mode === 'one' ? '🔂 Repeat One' : d.loop_mode === 'all' ? '🔁 Repeat All' : '🔁 Repeat Off');
    });
  }

  // ── Queue ──────────────────────────────────────────────────────────────────
  var _lastQueueJson = '';
  function renderQueue(q, curIdx){
    var json = JSON.stringify(q) + '|' + curIdx;
    if (json === _lastQueueJson) return; // avoid flicker if unchanged
    _lastQueueJson = json;
    var list = document.getElementById('queue-list');
    if (!q || !q.length){ list.innerHTML = '<div class="queue-empty">Queue is empty.<br>Browse to add songs or enable Auto-DJ.</div>'; return; }
    list.innerHTML = q.map(function(item, i){
      var title = item.title || item.relPath.split('/').pop();
      var sub   = [item.artist, item.album].filter(Boolean).join(' · ');
      var act   = i === curIdx;
      return '<div class="queue-item' + (act?' playing':'') + '" onclick="playIdx(' + i + ')">' +
        '<div class="queue-item-num">' + (act ? '▶' : (i+1)) + '</div>' +
        '<div class="queue-item-info">' +
          '<div class="queue-item-title">' + esc(title) + '</div>' +
          (sub ? '<div class="queue-item-sub">' + esc(sub) + '</div>' : '') +
        '</div>' +
        '<button class="queue-item-del" onclick="event.stopPropagation();removeIdx(' + i + ')" title="Remove">×</button>' +
      '</div>';
    }).join('');
  }

  function playIdx(i){ api('POST','api/v1/server-playback/queue/play-index',{ index: i }); }
  function removeIdx(i){ api('POST','api/v1/server-playback/queue/remove',{ index: i }).then(poll); }

  function clearAndRefill(){
    if (!confirm('Clear the queue?')) return;
    api('POST','api/v1/server-playback/queue/clear').then(function(){ poll(); toast('Queue cleared'); });
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  function setTab(t){
    _tab = t;
    ['queue','search','dj','browse'].forEach(function(n){
      document.getElementById('tab-'+n).classList.toggle('active', n===t);
      document.getElementById('panel-'+n).classList.toggle('active', n===t);
    });
    if (t==='browse' && !document.getElementById('browse-list').innerHTML) loadBrowse();
    if (t==='search') setTimeout(function(){ document.getElementById('search-input').focus(); }, 80);
  }

  // ── Auto-DJ ────────────────────────────────────────────────────────────────
  function onDjToggle(on){
    _djOn = on;
    _djIgnore = [];
    var btn = document.getElementById('dj-transport-btn');
    btn.classList.toggle('active', on);
    document.getElementById('dj-transport-label').textContent = on ? 'DJ ●' : 'DJ';
    updateDjStatus(on ? 'Ready — will queue next song automatically.' : 'Auto-DJ is off');
    if (on) maybeAutoDJ(_lastStatus);
  }

  function setDjMode(m){
    _djMode = m;
    document.getElementById('mode-random').classList.toggle('active', m==='random');
    document.getElementById('mode-similar').classList.toggle('active', m==='similar');
  }

  function updateDjStatus(msg, isOn){
    var el = document.getElementById('dj-status-bar');
    el.textContent = msg;
    el.className   = 'dj-status-bar' + (isOn ? ' on' : '');
  }

  function maybeAutoDJ(s){
    if (!_djOn || _djFetching || !s) return;
    // Fetch next song when queue is running low (fewer than 2 songs ahead of current)
    var ahead = s.queueLength - (s.currentIndex + 1);
    var nearEnd = s.duration > 0 && s.currentTime > s.duration - 25;
    if (ahead < 2 || nearEnd) {
      fetchDjSong(s);
    }
  }

  function fetchDjSong(s){
    if (_djFetching) return;
    _djFetching = true;
    updateDjStatus('Fetching next song…', true);

    var p;
    if (_djMode === 'similar' && s && s.queue && s.currentIndex >= 0 && s.queue[s.currentIndex] && s.queue[s.currentIndex].artist) {
      var artist = s.queue[s.currentIndex].artist;
      p = api('GET', 'api/v1/lastfm/similar-artists?artist=' + encodeURIComponent(artist))
        .then(function(artists){
          return api('POST','api/v1/db/random-songs',{
            ignoreList: _djIgnore,
            artists: artists && artists.length ? artists : undefined,
          });
        }).catch(function(){
          // Fallback to random if Last.fm fails
          return api('POST','api/v1/db/random-songs',{ ignoreList: _djIgnore });
        });
    } else {
      p = api('POST','api/v1/db/random-songs',{ ignoreList: _djIgnore });
    }

    p.then(function(data){
      if (!data || !data.songs || !data.songs.length) throw new Error('No songs');
      _djIgnore = data.ignoreList || _djIgnore;
      var song = data.songs[0];
      var meta = song.metadata || {};
      return api('POST','api/v1/server-playback/queue/add',{
        filepath: song.filepath,
        title:    meta.title              || '',
        artist:   meta.artist             || '',
        album:    meta.album              || '',
        albumArt: meta['album-art']       || '',
      });
    }).then(function(){
      _djFetching = false;
      updateDjStatus('Auto-DJ active — next song queued.', true);
    }).catch(function(e){
      _djFetching = false;
      updateDjStatus('Auto-DJ: could not find a song (' + (e.message||'error') + ')', false);
    });
  }

  // ── Search ────────────────────────────────────────────────────────────────
  function onSearchInput(){
    clearTimeout(_searchTimer);
    var q = document.getElementById('search-input').value.trim();
    var cl = document.getElementById('search-clear');
    cl.style.display = q ? 'block' : 'none';
    if (!q || q.length < 2) { document.getElementById('search-results-list').innerHTML = ''; _searchResults = []; return; }
    document.getElementById('search-results-list').innerHTML = '<div class="search-msg">Searching…</div>';
    _searchTimer = setTimeout(function(){ doSearch(q); }, 350);
  }

  function clearSearch(){
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').style.display = 'none';
    document.getElementById('search-results-list').innerHTML = '';
    _searchResults = [];
  }

  function doSearch(q){
    api('POST','api/v1/db/search',{ search: q, noArtists:true, noFolders:true, noAlbums:true, noFiles:true })
      .then(function(data){
        _searchResults = (data.title || []).slice(0, 25);
        var el = document.getElementById('search-results-list');
        if (!_searchResults.length){ el.innerHTML = '<div class="search-msg">No results for "' + esc(q) + '"</div>'; return; }
        var html = '';
        _searchResults.forEach(function(item, i){
          var raw    = item.name || '';
          var dash   = raw.indexOf(' - ');
          var artist = dash > -1 ? raw.slice(0, dash) : '';
          var title  = dash > -1 ? raw.slice(dash + 3) : raw;
          html += '<div class="search-item">'
            + '<div class="search-item-info">'
            + '<div class="search-item-title">' + esc(title) + '</div>'
            + (artist ? '<div class="search-item-artist">' + esc(artist) + '</div>' : '')
            + '</div>'
            + '<button class="search-item-add" onclick="addSearchResult(' + i + ')" title="Add to queue">+</button>'
            + '</div>';
        });
        el.innerHTML = html;
      }).catch(function(){
        document.getElementById('search-results-list').innerHTML = '<div class="search-msg">Search failed</div>';
      });
  }

  function addSearchResult(i){
    var item = _searchResults[i];
    if (!item) return;
    var raw    = item.name || '';
    var dash   = raw.indexOf(' - ');
    var artist = dash > -1 ? raw.slice(0, dash) : '';
    var title  = dash > -1 ? raw.slice(dash + 3) : raw;
    api('POST','api/v1/server-playback/queue/add',{ filepath: item.filepath, title: title, artist: artist, album: '', albumArt: '' })
      .then(function(){ toast('Added: ' + title); poll(); })
      .catch(function(){ toast('Could not add song'); });
  }

  // ── File browser ───────────────────────────────────────────────────────────
  function loadBrowse(){
    var list = document.getElementById('browse-list');
    list.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
    document.getElementById('breadcrumb').textContent = '/' + _pathStack.join('/');
    document.getElementById('bk-btn').disabled = _pathStack.length === 0;
    var dirStr = _pathStack.length ? _pathStack.join('/') + '/' : '';
    api('POST','api/v1/file-explorer',{ directory: dirStr })
      .then(function(data){
        var items = [];
        (data.directories||[]).forEach(function(d){ items.push({ type:'dir',  name: d.name }); });
        (data.files||[]).forEach(function(f){ items.push({ type:'file', name: f.name, path: data.path + f.name }); });
        if (!items.length){ list.innerHTML = '<div class="browser-empty">No files here</div>'; return; }
        list.innerHTML = '';
        items.forEach(function(item){
          var row  = document.createElement('div'); row.className = 'browser-item';
          var icon = document.createElement('span'); icon.className = 'browser-item-icon';
          icon.innerHTML = item.type === 'dir'
            ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
            : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
          var name = document.createElement('span'); name.className = 'browser-item-name'; name.textContent = item.name;
          row.appendChild(icon); row.appendChild(name);
          if (item.type === 'file') {
            var addBtn = document.createElement('button'); addBtn.className = 'browser-item-add'; addBtn.textContent = '+ Queue';
            (function(fp, nm){
              addBtn.onclick = function(e){
                e.stopPropagation();
                // Look up metadata from DB first
                api('POST','api/v1/db/metadata',{ filepath: fp })
                  .then(function(meta){
                    var m = meta.metadata || {};
                    return api('POST','api/v1/server-playback/queue/add',{
                      filepath: meta.filepath || fp,
                      title:    m.title              || nm,
                      artist:   m.artist             || '',
                      album:    m.album              || '',
                      albumArt: m['album-art']       || '',
                    });
                  }).catch(function(){
                    return api('POST','api/v1/server-playback/queue/add',{ filepath: fp, title: nm });
                  }).then(function(){ toast('Added: ' + nm); poll(); });
              };
              row.onclick = addBtn.onclick;
            }(item.path, item.name));
            row.appendChild(addBtn);
          } else {
            (function(n){ row.onclick = function(){ _pathStack.push(n); loadBrowse(); }; }(item.name));
          }
          list.appendChild(row);
        });
      }).catch(function(){ list.innerHTML = '<div class="browser-empty">Failed to load</div>'; });
  }

  function browseBack(){ if (_pathStack.length){ _pathStack.pop(); loadBrowse(); } }

  // ── Boot ───────────────────────────────────────────────────────────────────
  // Probe for no-auth mode first, then show login if needed
  tryNoAuthLogin();

  window.addEventListener('pagehide', function(){ if (_pollTimer) clearInterval(_pollTimer); });
  </script>
</body>
</html>
